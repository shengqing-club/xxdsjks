server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 8.130.155.128;  # 绑定域名后替换为实际域名

    # 前端静态文件目录
    root /www/wwwroot/student-system/dist;
    index index.html;

    # 文件上传大小限制（支持大文件上传）
    client_max_body_size 50m;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # 启用 sendfile（内核级零拷贝传输）
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # 静态资源缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理到 Node.js 后端
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（预留）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 大文件上传超时设置（5分钟）
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # SPA 回退：所有非文件请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 访问日志
    access_log /www/wwwlogs/8.130.155.128.log;
    error_log /www/wwwlogs/8.130.155.128.error.log;
}
